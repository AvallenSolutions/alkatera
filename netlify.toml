[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "18"
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_OPTIONS = "--max-old-space-size=4096"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://www.google-analytics.com https://api.resend.com https://api.anthropic.com https://*.posthog.com; frame-src 'self' https://js.stripe.com https://www.youtube.com https://youtube.com; object-src 'none'; base-uri 'self';"
    X-Permitted-Cross-Domain-Policies = "none"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Image headers for proper MIME types and caching
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Content-Type = "image/jpeg"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Content-Type = "image/jpeg"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.jpg"
  [headers.values]
    Content-Type = "image/jpeg"
    Cache-Control = "public, max-age=86400"

# SEO and LLM content headers
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

# ============================================================
# Scheduled functions (distributor portal background jobs)
# ============================================================
# Recommended cron schedules for the distributor portal's cron
# routes. Each entry maps the App Router route name (last segment
# of the path) to a cron expression. The @netlify/plugin-nextjs
# wraps each /api/cron/<name> route as a Netlify function named
# `app/api/cron/<name>/route`, which is what we target here.
#
# All cron routes require `Authorization: Bearer $CRON_SECRET`.
# Netlify's scheduled invoker adds this header automatically when
# CRON_SECRET is set as an environment variable on the site.
#
# To fire one manually for testing:
#   curl -X POST -H "Authorization: Bearer $CRON_SECRET" \
#     https://<site>/api/cron/<name>

[functions."app/api/cron/process-alkatera-sync-queue/route"]
  schedule = "*/1 * * * *"   # every 1 minute — real-time directory sync

[functions."app/api/cron/process-scraping-queue/route"]
  schedule = "*/5 * * * *"   # every 5 minutes

[functions."app/api/cron/process-document-queue/route"]
  schedule = "*/2 * * * *"   # every 2 minutes

[functions."app/api/cron/process-reminders/route"]
  schedule = "0 9 * * *"     # daily at 09:00 UTC

[functions."app/api/cron/run-brand-matching/route"]
  schedule = "0 3 * * *"     # daily at 03:00 UTC (alkatera-sync sweep)
